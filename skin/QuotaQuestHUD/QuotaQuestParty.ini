; ============================================================================
;  QuotaQuest — PARTY view (per-AI bars). EnergyHUD Engine v2.
;  One row per connected AI (up to 3 shown). Each: name + status + HP + MP.
;  NOTE: per-AI layout is best-effort; verify on Windows (docs/RENDER_TEST.md).
;  Capture per member: name, status, hpBar, hpLine, mpBar, mpLine.
; ============================================================================

[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1
@includeVars=#@#../Variables.inc

[Metadata]
Name=QuotaQuest (Party)
Author=QuotaQuest
Information=Per-AI HP/MP bars for a party of connected models. Not affiliated with Anthropic.
Version=0.3.0
License=MIT

[mState]
Measure=WebParser
Url=file://#StatePath#
RegExp=(?siU)"name": "(.*)".*"status": "(.*)".*"bar": (.*),.*"line": "(.*)".*"bar": (.*),.*"line": "(.*)".*"name": "(.*)".*"status": "(.*)".*"bar": (.*),.*"line": "(.*)".*"bar": (.*),.*"line": "(.*)".*"name": "(.*)".*"status": "(.*)".*"bar": (.*),.*"line": "(.*)".*"bar": (.*),.*"line": "(.*)"
UpdateRate=15
FinishAction=[!UpdateMeterGroup Bars][!Redraw]

; --- member 1 ---
[m1Name]
Measure=WebParser
Url=[mState]
StringIndex=1
[m1Color]
Measure=WebParser
Url=[mState]
StringIndex=2
Substitute="NORMAL":"60,200,120,255","WARNING":"240,180,40,255","CRITICAL":"235,70,70,255"
[m1HPbar]
Measure=WebParser
Url=[mState]
StringIndex=3
[m1MPbar]
Measure=WebParser
Url=[mState]
StringIndex=5
[m1MPline]
Measure=WebParser
Url=[mState]
StringIndex=6
; --- member 2 ---
[m2Name]
Measure=WebParser
Url=[mState]
StringIndex=7
[m2Color]
Measure=WebParser
Url=[mState]
StringIndex=8
Substitute="NORMAL":"60,200,120,255","WARNING":"240,180,40,255","CRITICAL":"235,70,70,255"
[m2HPbar]
Measure=WebParser
Url=[mState]
StringIndex=9
[m2MPbar]
Measure=WebParser
Url=[mState]
StringIndex=11
[m2MPline]
Measure=WebParser
Url=[mState]
StringIndex=12
; --- member 3 (optional) ---
[m3Name]
Measure=WebParser
Url=[mState]
StringIndex=13
[m3Color]
Measure=WebParser
Url=[mState]
StringIndex=14
Substitute="NORMAL":"60,200,120,255","WARNING":"240,180,40,255","CRITICAL":"235,70,70,255"
[m3HPbar]
Measure=WebParser
Url=[mState]
StringIndex=15
[m3MPbar]
Measure=WebParser
Url=[mState]
StringIndex=17

[meterPanel]
Meter=Shape
Shape=Rectangle 0,0,#PanelWidth#,214,14 | Fill Color #ColBG# | StrokeWidth 1 | Stroke Color #ColPanelLine#
[meterTitle]
Meter=String
X=16
Y=12
FontFace=Segoe UI
FontSize=11
FontWeight=700
FontColor=#ColText#
AntiAlias=1
Text=⚡ QUOTAQUEST · PARTY

; ===== member 1 =====
[me1dot]
Meter=Shape
DynamicVariables=1
Shape=Ellipse 22,52,5 | Fill Color [m1Color]
[me1name]
Meter=String
X=34
Y=44
FontFace=Segoe UI
FontSize=10
FontWeight=700
FontColor=#ColText#
DynamicVariables=1
AntiAlias=1
Text=[m1Name]
[me1hptrack]
Meter=Shape
X=34
Y=62
Shape=Rectangle 0,0,180,9,4 | Fill Color #ColTrack#
[me1hp]
Meter=Shape
Group=Bars
X=34
Y=62
DynamicVariables=1
Shape=Rectangle 0,0,(180*[m1HPbar]/100),9,4 | Fill Color [m1Color]
[me1mptrack]
Meter=Shape
X=34
Y=74
Shape=Rectangle 0,0,180,7,3 | Fill Color #ColTrack#
[me1mp]
Meter=Shape
Group=Bars
X=34
Y=74
DynamicVariables=1
Shape=Rectangle 0,0,(180*[m1MPbar]/100),7,3 | Fill Color #ColMP#
[me1hpval]
