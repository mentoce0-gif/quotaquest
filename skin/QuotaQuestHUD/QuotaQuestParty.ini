X=#ValueX#
Y=46
StringAlign=Right
FontFace=Segoe UI
FontSize=8
FontColor=#ColDim#
DynamicVariables=1
AntiAlias=1
Text=HP [m1HPbar]% · MP [m1MPbar]%

