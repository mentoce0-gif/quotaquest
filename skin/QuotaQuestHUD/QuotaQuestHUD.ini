; ============================================================================
;  QuotaQuest — Rainmeter skin (EnergyHUD Engine v2, AGGREGATE view)
;  Shows the party rollup: HP/MP/EXP, Regen, Recovery + FullRecover, Burn,
;  status, and an "N AIs" badge. For per-AI bars use QuotaQuestParty.ini.
;  Reads state.json (schema v2). Status label is right-aligned (no clipping).
; ============================================================================

[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1
@includeVars=#@#../Variables.inc

[Metadata]
Name=QuotaQuest (Aggregate)
Author=QuotaQuest
Information=Party rollup of your AI usage as an RPG energy bar. Not affiliated with Anthropic.
Version=0.3.0
License=MIT

; --------------------------------------------------------------------------
;  MEASURES — parse state.json (top-level aggregate mirror)
;  Capture: providerCount(1) status(2) hpBar(3) hpLine(4) mpBar(5) mpLine(6)
;           expBar(7) expLine(8) regenLine(9) recHuman(10) recFull(11) burn(12)
; --------------------------------------------------------------------------
[mState]
Measure=WebParser
Url=file://#StatePath#
RegExp=(?siU)"providerCount": (.*),.*"status": "(.*)".*"bar": (.*),.*"line": "(.*)".*"bar": (.*),.*"line": "(.*)".*"bar": (.*),.*"line": "(.*)".*"line": "(.*)".*"human": "(.*)".*"fullHuman": "(.*)".*"level": "(.*)"
UpdateRate=15
FinishAction=[!UpdateMeterGroup Bars][!Redraw]

[mCount]
Measure=WebParser
Url=[mState]
StringIndex=1
[mStatus]
Measure=WebParser
Url=[mState]
StringIndex=2
[mStatusColor]
Measure=WebParser
Url=[mState]
StringIndex=2
Substitute="NORMAL":"60,200,120,255","WARNING":"240,180,40,255","CRITICAL":"235,70,70,255"
[mHPbar]
Measure=WebParser
Url=[mState]
StringIndex=3
[mHPline]
Measure=WebParser
Url=[mState]
StringIndex=4
[mMPbar]
Measure=WebParser
Url=[mState]
StringIndex=5
[mMPline]
Measure=WebParser
Url=[mState]
StringIndex=6
[mEXPbar]
Measure=WebParser
Url=[mState]
StringIndex=7
[mEXPline]
Measure=WebParser
Url=[mState]
StringIndex=8
[mRegen]
Measure=WebParser
Url=[mState]
StringIndex=9
[mRecovery]
Measure=WebParser
Url=[mState]
StringIndex=10
[mRecoveryFull]
Measure=WebParser
Url=[mState]
StringIndex=11
[mBurn]
Measure=WebParser
Url=[mState]
StringIndex=12

; --------------------------------------------------------------------------
;  PANEL
; --------------------------------------------------------------------------
[meterPanel]
Meter=Shape
Shape=Rectangle 0,0,#PanelWidth#,#PanelHeight2#,14 | Fill Color #ColBG# | StrokeWidth 1 | Stroke Color #ColPanelLine#

[meterTitle]
Meter=String
X=16
Y=14
FontFace=Segoe UI
FontSize=11
FontWeight=700
FontColor=#ColText#
AntiAlias=1
Text=⚡ QUOTAQUEST
[meterCount]
Meter=String
X=128
Y=17
FontFace=Segoe UI
FontSize=8
FontColor=#ColSub#
DynamicVariables=1
AntiAlias=1
Text=[mCount] AIs · party

[meterDot]
Meter=Shape
DynamicVariables=1
Shape=Ellipse 270,20,5 | Fill Color [mStatusColor]
[meterStatus]
Meter=String
X=#ValueX#
Y=14
StringAlign=Right
FontFace=Segoe UI
FontSize=10
FontWeight=700
DynamicVariables=1
FontColor=[mStatusColor]
AntiAlias=1
Text=[mStatus]

; ---------------- HP / MP / EXP ----------------
[meterHPlabel]
