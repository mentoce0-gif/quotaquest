[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1
@Include=#@#variables.inc
; ---- Right-click: switch back to the full HUD, or change theme ----
ContextTitle=Open full HUD
ContextAction=[!ActivateConfig "AIEnergyHUD" "AIEnergyHUD.ini"]
ContextTitle2=--------------------
ContextTitle3=Theme: Cyberpunk
ContextAction3=[!WriteKeyValue Variables Theme "Cyberpunk" "#@#variables.inc"][!Refresh]
ContextTitle4=Theme: Fantasy
ContextAction4=[!WriteKeyValue Variables Theme "Fantasy" "#@#variables.inc"][!Refresh]
ContextTitle5=Theme: Minimal
ContextAction5=[!WriteKeyValue Variables Theme "Minimal" "#@#variables.inc"][!Refresh]
ContextTitle6=Theme: Terminal
ContextAction6=[!WriteKeyValue Variables Theme "Terminal" "#@#variables.inc"][!Refresh]
ContextTitle7=Theme: Mascot
ContextAction7=[!WriteKeyValue Variables Theme "Mascot" "#@#variables.inc"][!Refresh]
ContextTitle8=Theme: Radial
ContextAction8=[!WriteKeyValue Variables Theme "Radial" "#@#variables.inc"][!Refresh]

; =====================================================================
;  DATA — same flat state.json contract as the full HUD
; =====================================================================
[MeasureState]
Measure=WebParser
URL=file://#@#state.json
RegExp=(?siU)"status": "(.*)".*"hp_percent": (.*),.*"mp_percent": (.*),.*"recovery": "(.*)".*"claude_hp_percent": (.*),.*"claude_status": "(.*)".*"codex_hp_percent": (.*),.*"codex_status": "(.*)"
UpdateRate=1

[MeasureStatus]
Measure=WebParser
URL=[MeasureState]
StringIndex=1

[MeasureHP]
Measure=WebParser
URL=[MeasureState]
StringIndex=2
DynamicVariables=1
IfCondition=(MeasureHP < 15)
IfTrueAction=[!SetOption MeterHPBar BarColor "#HPColorCritical#"][!SetOption MeterStatus FontColor "#StatCritical#"]
IfCondition2=(MeasureHP >= 15) && (MeasureHP < 40)
IfTrueAction2=[!SetOption MeterHPBar BarColor "#HPColorWarning#"][!SetOption MeterStatus FontColor "#StatWarning#"]
IfCondition3=(MeasureHP >= 40)
IfTrueAction3=[!SetOption MeterHPBar BarColor "#HPColorNormal#"][!SetOption MeterStatus FontColor "#StatNormal#"]

[MeasureMP]
Measure=WebParser
URL=[MeasureState]
StringIndex=3

[MeasureRecovery]
Measure=WebParser
URL=[MeasureState]
StringIndex=4

[MeasureClaudeHP]
Measure=WebParser
URL=[MeasureState]
StringIndex=5

[MeasureClaudeStatus]
Measure=WebParser
URL=[MeasureState]
StringIndex=6

[MeasureCodexHP]
Measure=WebParser
URL=[MeasureState]
StringIndex=7
DynamicVariables=1
IfCondition=(MeasureCodexHP < 0)
IfTrueAction=[!SetOption MeterParty Text "CLAUDE [MeasureClaudeHP]%   CODEX ??"]
IfCondition2=(MeasureCodexHP >= 0)
IfTrueAction2=[!SetOption MeterParty Text "CLAUDE [MeasureClaudeHP]%   CODEX [MeasureCodexHP]%"]

[MeasureCodexStatus]
Measure=WebParser
URL=[MeasureState]
StringIndex=8

; =====================================================================
;  COMPACT LAYOUT (slim pill, OBS-friendly)
; =====================================================================
[MeterBg]
Meter=Shape
Shape=Rectangle 0,0,330,78,10 | FillColor 8,10,16,150 | StrokeWidth 1 | Stroke Color #StrokeColor#

[MeterHPLabel]
Meter=String
X=14
Y=12
FontFace=#FontFace#
FontSize=12
FontColor=#DimColor#
StringStyle=Bold
AntiAlias=1
Text=HP

[MeterHPBarBg]
Meter=Image
X=46
Y=14
W=200
H=12
SolidColor=#BarBgColor#

[MeterHPBar]
Meter=Bar
MeasureName=MeasureHP
X=46
Y=14
W=200
H=12
BarColor=#HPColorNormal#
BarOrientation=Horizontal
MinValue=0
MaxValue=100

[MeterHPpct]
Meter=String
X=316
Y=10
FontFace=#FontFaceMono#
FontSize=13
FontColor=#TextColor#
StringAlign=Right
AntiAlias=1
MeasureName=MeasureHP
Text=%1%
DynamicVariables=1

[MeterMPLabel]
Meter=String
X=14
Y=34
FontFace=#FontFace#
FontSize=12
FontColor=#DimColor#
StringStyle=Bold
AntiAlias=1
Text=MP

[MeterMPBarBg]
Meter=Image
X=46
Y=36
W=200
H=12
SolidColor=#BarBgColor#

[MeterMPBar]
Meter=Bar
MeasureName=MeasureMP
X=46
Y=36
W=200
H=12
BarColor=#MPColor#
BarOrientation=Horizontal
MinValue=0
MaxValue=100

[MeterMPpct]
Meter=String
X=316
Y=32
FontFace=#FontFaceMono#
FontSize=13
FontColor=#TextColor#
StringAlign=Right
AntiAlias=1
MeasureName=MeasureMP
Text=%1%
DynamicVariables=1

[MeterStatus]
Meter=String
X=14
Y=56
FontFace=#FontFace#
FontSize=11
StringStyle=Bold
FontColor=#StatNormal#
AntiAlias=1
MeasureName=MeasureStatus
Text=%1
DynamicVariables=1

[MeterParty]
Meter=String
X=316
Y=56
FontFace=#FontFaceMono#
FontSize=10
FontColor=#DimColor#
StringAlign=Right
AntiAlias=1
MeasureName=MeasureClaudeHP
MeasureName2=MeasureCodexHP
Text=CLAUDE %1%   CODEX %2%
DynamicVariables=1
