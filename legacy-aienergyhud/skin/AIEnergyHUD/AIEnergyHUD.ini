[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1
@Include=#@#variables.inc

; ---- Right-click theme switcher (writes Theme= then refreshes) ----
ContextTitle=Theme: Cyberpunk
ContextAction=[!WriteKeyValue Variables Theme "Cyberpunk" "#@#variables.inc"][!Refresh]
ContextTitle2=Theme: Fantasy
ContextAction2=[!WriteKeyValue Variables Theme "Fantasy" "#@#variables.inc"][!Refresh]
ContextTitle3=Theme: Minimal
ContextAction3=[!WriteKeyValue Variables Theme "Minimal" "#@#variables.inc"][!Refresh]
ContextTitle4=Theme: Terminal
ContextAction4=[!WriteKeyValue Variables Theme "Terminal" "#@#variables.inc"][!Refresh]
ContextTitle5=Theme: Mascot
ContextAction5=[!WriteKeyValue Variables Theme "Mascot" "#@#variables.inc"][!Refresh]
ContextTitle6=Theme: Radial
ContextAction6=[!WriteKeyValue Variables Theme "Radial" "#@#variables.inc"][!Refresh]
ContextTitle7=--------------------
ContextTitle8=Edit config (calibrate HP max)
ContextAction8=[]

[Metadata]
Name=AI Energy HUD
Author=AI Energy HUD
Information=MMORPG-style HUD for AI coding usage (Claude Code / Codex). Reads @Resources\state.json written by the Node monitor.
Version=1.0.0
License=MIT

; =====================================================================
;  DATA  — read the flat state.json via WebParser (RegExp, file://)
;  Key order is fixed by the monitor, so the capture order is stable.
; =====================================================================
[MeasureState]
Measure=WebParser
URL=file://#@#state.json
RegExp=(?siU)"status": "(.*)".*"model": "(.*)".*"hp_percent": (.*),.*"hp_current": (.*),.*"hp_max": (.*),.*"mp_percent": (.*),.*"mp_minutes": (.*),.*"mp_max_minutes": (.*),.*"regen_per_min": (.*),.*"burn_per_hour": (.*),.*"recovery": "(.*)".*"exp_today": (.*),.*"exp_week": (.*),.*"exp_month": (.*),.*"claude_hp_percent": (.*),.*"claude_status": "(.*)".*"codex_hp_percent": (.*),.*"codex_status": "(.*)"
UpdateRate=1
RegExpSubstitute=1

[MeasureStatus]
Measure=WebParser
URL=[MeasureState]
StringIndex=1

[MeasureModel]
Measure=WebParser
URL=[MeasureState]
StringIndex=2

[MeasureHP]
Measure=WebParser
URL=[MeasureState]
StringIndex=3
; Drive bar color + status color from HP%
DynamicVariables=1
IfCondition=(MeasureHP < 15)
IfTrueAction=[!SetOption MeterHPBar BarColor "#HPColorCritical#"][!SetOption MeterStatusVal FontColor "#StatCritical#"][!UpdateMeter *][!Redraw]
IfCondition2=(MeasureHP >= 15) && (MeasureHP < 40)
IfTrueAction2=[!SetOption MeterHPBar BarColor "#HPColorWarning#"][!SetOption MeterStatusVal FontColor "#StatWarning#"][!UpdateMeter *][!Redraw]
IfCondition3=(MeasureHP >= 40)
IfTrueAction3=[!SetOption MeterHPBar BarColor "#HPColorNormal#"][!SetOption MeterStatusVal FontColor "#StatNormal#"][!UpdateMeter *][!Redraw]

[MeasureHPcur]
Measure=WebParser
URL=[MeasureState]
StringIndex=4

[MeasureHPmax]
Measure=WebParser
URL=[MeasureState]
StringIndex=5

[MeasureMP]
Measure=WebParser
URL=[MeasureState]
StringIndex=6

[MeasureMPmin]
Measure=WebParser
URL=[MeasureState]
StringIndex=7

[MeasureMPmax]
Measure=WebParser
URL=[MeasureState]
StringIndex=8

[MeasureRegen]
Measure=WebParser
URL=[MeasureState]
StringIndex=9

[MeasureBurn]
Measure=WebParser
URL=[MeasureState]
StringIndex=10

[MeasureRecovery]
Measure=WebParser
URL=[MeasureState]
StringIndex=11

[MeasureToday]
Measure=WebParser
URL=[MeasureState]
StringIndex=12

[MeasureWeek]
Measure=WebParser
URL=[MeasureState]
StringIndex=13

[MeasureMonth]
Measure=WebParser
URL=[MeasureState]
StringIndex=14

[MeasureClaudeHP]
Measure=WebParser
URL=[MeasureState]
StringIndex=15

[MeasureClaudeStatus]
Measure=WebParser
URL=[MeasureState]
StringIndex=16

[MeasureCodexHP]
Measure=WebParser
URL=[MeasureState]
StringIndex=17
DynamicVariables=1
; -1 means UNKNOWN (silent consumption / token data missing)
IfCondition=(MeasureCodexHP < 0)
IfTrueAction=[!SetOption MeterPartyCodexVal Text "??  UNKNOWN"][!SetOption MeterPartyCodexVal FontColor "#StatUnknown#"][!SetOption MeterPartyCodexBar BarColor "#StatUnknown#"]
IfCondition2=(MeasureCodexHP >= 0)
IfTrueAction2=[!SetOption MeterPartyCodexVal FontColor "#DimColor#"][!SetOption MeterPartyCodexBar BarColor "#HPColorNormal#"]

[MeasureCodexStatus]
Measure=WebParser
URL=[MeasureState]
StringIndex=18

; =====================================================================
;  STYLES
; =====================================================================
[sLabel]
FontFace=#FontFace#
FontSize=#FontLabel#
FontColor=#DimColor#
AntiAlias=1
StringStyle=Bold

[sValue]
FontFace=#FontFaceMono#
FontSize=#FontValue#
FontColor=#TextColor#
AntiAlias=1
StringAlign=Right

[sBarBg]
Meter=Image
SolidColor=#BarBgColor#
H=#BarH#
W=#BarW#

; =====================================================================
;  BACKGROUND PANEL
; =====================================================================
[MeterBg]
Meter=Shape
Shape=Rectangle 0,0,#W#,236,12 | FillColor #BgColor# | StrokeWidth 1 | Stroke Color #StrokeColor#
Shape2=Rectangle 8,8,(#W#-16),40,8 | FillColor #PanelColor#

; ---- Title row ----
[MeterTitle]
Meter=String
MeterStyle=sLabel
X=18
Y=16
FontSize=#FontLabel#
FontColor=#AccentColor#
Text=AI ENERGY HUD

[MeterModel]
Meter=String
MeterStyle=sLabel
X=(#W#-18)
Y=16
StringAlign=Right
FontColor=#DimColor#
MeasureName=MeasureModel
Text=%1
DynamicVariables=1

; =====================================================================
;  HP
; =====================================================================
[MeterHPLabel]
Meter=String
MeterStyle=sLabel
X=18
Y=60
Text=HP

[MeterHPBarBg]
MeterStyle=sBarBg
Meter=Image
X=60
Y=62

[MeterHPBar]
Meter=Bar
MeasureName=MeasureHP
X=60
Y=62
W=#BarW#
H=#BarH#
BarColor=#HPColorNormal#
BarOrientation=Horizontal
MinValue=0
MaxValue=100

[MeterHPpct]
Meter=String
MeterStyle=sValue
X=(#W#-18)
Y=58
MeasureName=MeasureHP
Text=%1%
DynamicVariables=1

[MeterHPtokens]
Meter=String
MeterStyle=sLabel
X=60
Y=82
FontSize=#FontSmall#
MeasureName=MeasureHPcur
MeasureName2=MeasureHPmax
Text=%1 / %2 tokens
DynamicVariables=1

; =====================================================================
;  MP
; =====================================================================
[MeterMPLabel]
Meter=String
MeterStyle=sLabel
X=18
Y=104
Text=MP

[MeterMPBarBg]
MeterStyle=sBarBg
Meter=Image
X=60
Y=106

[MeterMPBar]
Meter=Bar
MeasureName=MeasureMP
X=60
Y=106
W=#BarW#
H=#BarH#
BarColor=#MPColor#
BarOrientation=Horizontal
MinValue=0
MaxValue=100

[MeterMPpct]
Meter=String
MeterStyle=sValue
X=(#W#-18)
Y=102
MeasureName=MeasureMP
Text=%1%
DynamicVariables=1

[MeterMPmin]
Meter=String
MeterStyle=sLabel
X=60
Y=126
FontSize=#FontSmall#
MeasureName=MeasureMPmin
MeasureName2=MeasureMPmax
Text=session  %1 / %2 min
