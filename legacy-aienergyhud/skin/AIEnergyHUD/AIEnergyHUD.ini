DynamicVariables=1

[MeterRecovery]
Meter=String
MeterStyle=sLabel
X=(#W#-18)
Y=150
StringAlign=Right
FontColor=#TextColor#
MeasureName=MeasureRecovery
Text=RECOVERY  %1
DynamicVariables=1

[MeterBurn]
Meter=String
MeterStyle=sLabel
X=18
Y=168
FontColor=#TextColor#
MeasureName=MeasureBurn
Text=BURN  %1/h
DynamicVariables=1

[MeterStatusLabel]
Meter=String
MeterStyle=sLabel
X=250
Y=168
Text=STATUS

[MeterStatusVal]
Meter=String
X=(#W#-18)
Y=168
FontFace=#FontFace#
FontSize=#FontLabel#
StringAlign=Right
StringStyle=Bold
FontColor=#StatNormal#
