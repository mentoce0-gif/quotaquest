[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1
@Include=#@#variables.inc
; ---- Right-click: back to full HUD / change theme ----
ContextTitle=Open full HUD
ContextAction=[!ActivateConfig "AIEnergyHUD" "AIEnergyHUD.ini"]
ContextTitle2=Open compact overlay
ContextAction2=[!ActivateConfig "AIEnergyHUD" "Compact.ini"]

[Metadata]
Name=AI Energy HUD — Radial (circular gauges)
Author=AI Energy HUD
Version=1.0.0
License=MIT

; =====================================================================
;  DATA (same flat state.json contract)
; =====================================================================
[MeasureState]
Measure=WebParser
URL=file://#@#state.json
RegExp=(?siU)"status": "(.*)".*"hp_percent": (.*),.*"mp_percent": (.*),.*"recovery": "(.*)"
UpdateRate=1

[MeasureStatus]
Measure=WebParser
URL=[MeasureState]
StringIndex=1

[MeasureHP]
Measure=WebParser
URL=[MeasureState]
StringIndex=2
MinValue=0
MaxValue=100
DynamicVariables=1
IfCondition=(MeasureHP < 15)
IfTrueAction=[!SetOption MeterHPArc LineColor "#HPColorCritical#"][!SetOption MeterHPpct FontColor "#HPColorCritical#"][!SetOption MeterStatus FontColor "#StatCritical#"]
IfCondition2=(MeasureHP >= 15) && (MeasureHP < 40)
IfTrueAction2=[!SetOption MeterHPArc LineColor "#HPColorWarning#"][!SetOption MeterHPpct FontColor "#HPColorWarning#"][!SetOption MeterStatus FontColor "#StatWarning#"]
IfCondition3=(MeasureHP >= 40)
IfTrueAction3=[!SetOption MeterHPArc LineColor "#HPColorNormal#"][!SetOption MeterHPpct FontColor "#TextColor#"][!SetOption MeterStatus FontColor "#StatNormal#"]

[MeasureMP]
Measure=WebParser
URL=[MeasureState]
StringIndex=3
MinValue=0
MaxValue=100

[MeasureFull]
Measure=Calc
Formula=100
MinValue=0
MaxValue=100

; =====================================================================
;  RADIAL GAUGES  (center 105,105)
; =====================================================================
[MeterBg]
Meter=Shape
Shape=Rectangle 0,0,210,232,16 | FillColor #BgColor# | StrokeWidth 1 | Stroke Color #StrokeColor#

; ---- HP outer ring ----
[MeterHPTrack]
Meter=Roundline
MeasureName=MeasureFull
X=105
Y=105
StartAngle=4.712388
RotationAngle=6.283185
LineStart=72
LineLength=88
Solid=1
LineColor=#BarBgColor#
AntiAlias=1

[MeterHPArc]
Meter=Roundline
MeasureName=MeasureHP
X=105
Y=105
StartAngle=4.712388
RotationAngle=6.283185
LineStart=72
LineLength=88
Solid=1
LineColor=#HPColorNormal#
AntiAlias=1

; ---- MP inner ring ----
[MeterMPTrack]
Meter=Roundline
MeasureName=MeasureFull
X=105
Y=105
StartAngle=4.712388
RotationAngle=6.283185
LineStart=48
LineLength=64
Solid=1
LineColor=#BarBgColor#
AntiAlias=1

[MeterMPArc]
Meter=Roundline
MeasureName=MeasureMP
X=105
Y=105
StartAngle=4.712388
RotationAngle=6.283185
LineStart=48
LineLength=64
Solid=1
LineColor=#MPColor#
AntiAlias=1

; ---- Center readout ----
[MeterHPpct]
Meter=String
X=105
Y=88
FontFace=#FontFaceMono#
FontSize=34
FontColor=#TextColor#
StringAlign=CenterCenter
AntiAlias=1
MeasureName=MeasureHP
Text=%1%
DynamicVariables=1

[MeterHPLabel]
Meter=String
X=105
Y=118
FontFace=#FontFace#
FontSize=11
FontColor=#DimColor#
StringAlign=CenterCenter
StringStyle=Bold
AntiAlias=1
Text=HP

; ---- Footer ----
[MeterStatus]
Meter=String
X=105
Y=196
FontFace=#FontFace#
FontSize=13
FontColor=#StatNormal#
StringAlign=CenterCenter
StringStyle=Bold
AntiAlias=1
MeasureName=MeasureStatus
Text=%1
DynamicVariables=1

[MeterMPpct]
Meter=String
X=105
Y=214
FontFace=#FontFaceMono#
FontSize=10
FontColor=#MPColor#
StringAlign=CenterCenter
AntiAlias=1
MeasureName=MeasureMP
Text=MP %1%
DynamicVariables=1
